<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>מסלול התנועות- גרסת מסך הפתיחה</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --primary: #6c5ce7;
            --secondary: #ff7675;
            --accent: #0081ff;
            --gold: #ffd700;
            --glass: rgba(255, 255, 255, 0.95);
            --bg: #eef2f7;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: radial-gradient(circle at top right, #fdfbfb 0%, #ebedee 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
            color: #2d3436;
            overflow-x: hidden;
            height: 100vh;
        }

        /* מסך פתיחה */
        #intro-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(108, 92, 231, 0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: 0.5s ease-out;
        }

        #intro-content {
            background: white;
            padding: 50px;
            border-radius: 50px;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0,0,0,0.3);
            max-width: 500px;
            border: 5px solid var(--gold);
        }

        #intro-content h2 { color: var(--primary); font-size: 2.5em; margin-bottom: 15px; }
        #intro-content p { font-size: 1.3em; color: #636e72; line-height: 1.6; }

        .start-btn {
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: white; border: none; padding: 20px 50px;
            font-size: 1.5em; font-weight: bold; border-radius: 30px;
            cursor: pointer; margin-top: 25px; transition: 0.3s;
            box-shadow: 0 10px 20px rgba(108, 92, 231, 0.3);
        }
        .start-btn:hover { transform: scale(1.1); background: var(--secondary); }

        /* תוכן המשחק - מטושטש בהתחלה */
        #main-game {
            filter: blur(10px);
            transition: 0.5s;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 { 
            font-size: 2.5em;
            background: linear-gradient(to left, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
        }

        .dice-container { perspective: 1000px; margin: 20px 0; }
        .dice {
            width: 80px; height: 80px;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .dice div {
            position: absolute; width: 80px; height: 80px;
            background: white; border: 2px solid #eee;
            line-height: 80px; text-align: center;
            font-size: 36px; font-weight: 900;
            border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            color: var(--primary);
        }
        .front { transform: translateZ(40px); } .back { transform: rotateY(180deg) translateZ(40px); }
        .right { transform: rotateY(90deg) translateZ(40px); } .left { transform: rotateY(-90deg) translateZ(40px); }
        .top { transform: rotateX(90deg) translateZ(40px); } .bottom { transform: rotateX(-90deg) translateZ(40px); }

        #game-layout { display: flex; gap: 40px; align-items: flex-start; margin-top: 20px; }

        #board {
            display: grid;
            grid-template-columns: repeat(5, 110px);
            grid-template-rows: repeat(5, 110px);
            gap: 15px;
            background: var(--glass);
            padding: 35px;
            border-radius: 40px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.08);
            position: relative;
            border: 2px solid white;
        }

        .cell {
            width: 110px; height: 110px;
            background: #ffffff;
            border-radius: 30px;
            display: flex; align-items: center; justify-content: center;
            position: relative;
            border: 1px solid rgba(0,0,0,0.05);
            transition: all 0.3s ease;
        }

        .cell.has-task { border: 2px solid var(--primary); animation: pulse 2s infinite; }
        .cell.finish-cell { border: 3px solid var(--gold); background: #fffdf0; box-shadow: 0 0 20px rgba(255, 215, 0, 0.4); }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(108, 92, 231, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(108, 92, 231, 0); }
            100% { box-shadow: 0 0 0 0 rgba(108, 92, 231, 0); }
        }

        .cell img { width: 65%; height: 65%; object-fit: contain; z-index: 1; }
        .cell.finish-cell img { width: 85%; height: 85%; }
        
        .num-tag {
            position: absolute; top: 10px; right: 12px;
            color: #dfe6e9; font-size: 24px; font-weight: 900; z-index: 0;
        }

        #c1{grid-area: 1/1} #c2{grid-area: 1/2} #c3{grid-area: 1/3} #c4{grid-area: 1/4} #c5{grid-area: 1/5}
        #c6{grid-area: 2/5} #c7{grid-area: 3/5} #c8{grid-area: 3/4} #c9{grid-area: 3/3} #c10{grid-area: 3/2}
        #c11{grid-area: 3/1} #c12{grid-area: 4/1} #c13{grid-area: 5/1} #c14{grid-area: 5/2} #c15{grid-area: 5/3}
        #c16{grid-area: 5/4} #c17{grid-area: 5/5}

        #player {
            width: 60px; height: 60px;
            background: linear-gradient(135deg, var(--secondary), #ff9f43);
            border: 5px solid white;
            border-radius: 50%;
            position: absolute;
            z-index: 10;
            transition: all 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            box-shadow: 0 10px 25px rgba(255, 118, 117, 0.5);
            display: flex; align-items: center; justify-content: center;
            font-size: 32px;
        }

        #panel {
            width: 320px; background: white; padding: 30px;
            border-radius: 40px; text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.05);
            border: 1px solid #f1f2f6;
        }
        
        #ex-img-big { 
            width: 100%; border-radius: 25px; margin-top: 20px; 
            box-shadow: 0 15px 30px rgba(0,0,0,0.1); display: none;
        }

        button {
            padding: 20px 60px; font-size: 1.4em; cursor: pointer;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: white; border: none; border-radius: 25px;
            transition: 0.4s; font-weight: bold;
            box-shadow: 0 12px 24px rgba(108, 92, 231, 0.4);
        }
        button:hover { transform: translateY(-5px) scale(1.05); }
        button:disabled { background: #dfe6e9; box-shadow: none; transform: none; }

        /* --- עיצוב משימת הכספת --- */
        #safe-page {
            display: none;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        .drop-container { display: flex; gap: 20px; margin: 30px 0; }
        .target-slot {
            width: 110px; height: 110px;
            border: 4px dashed var(--primary);
            border-radius: 20px;
            background: rgba(255,255,255,0.5);
            display: flex; align-items: center; justify-content: center;
        }

        .inventory { display: flex; gap: 15px; margin-bottom: 40px; min-height: 100px; }
        .inventory img, .target-slot img { 
            width: 90px; height: 90px; 
            object-fit: contain; 
            cursor: grab;
        }

        .safe-wrapper {
            position: relative;
            width: 600px;
            height: 400px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .safe-part {
            height: 100%;
            position: absolute;
            z-index: 5;
            transition: transform 1.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        #safe-orange { left: 50%; transform: translateX(-100%); }
        #safe-green { left: 50%; }

        #key-img {
            position: absolute;
            width: 120px;
            z-index: 10;
            cursor: pointer;
            display: none;
            animation: bounce 2s infinite;
        }

        #afikoman-result {
            position: absolute;
            width: 250px;
            z-index: 1;
            display: none;
        }

        .safe-open #safe-orange { transform: translateX(-180%); }
        .safe-open #safe-green { transform: translateX(80%); }

        @keyframes bounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }
    </style>
</head>
<body>

    <div id="intro-overlay">
        <div id="intro-content">
            <h2>ברוכים הבאים למשחק חפש את האפיקומן! 🏃‍♀️</h2>
            <p>במשימה הראשונה- עליך להגיע לסוף מסלול התנועות. במשימה השניה- עליך לפתוח את הכספת. בהצלחה.</p>
            <button class="start-btn" onclick="startGame()">מתחילים!</button>
        </div>
    </div>

    <div id="main-game">
        <h1>✨ מסלול התנועות ✨</h1>
        <audio id="win-sound" src="https://www.soundjay.com/human/applause-01.mp3" preload="auto"></audio>

        <div class="dice-container">
            <div class="dice" id="dice">
                <div class="front">1</div><div class="back">1</div>
                <div class="right">2</div><div class="left">2</div>
                <div class="top">3</div><div class="bottom">3</div>
            </div>
        </div>
        
        <button id="roll-btn" onclick="rollDice()">הטל קובייה (1-3)</button>

        <div id="game-layout">
            <div id="board"><div id="player">👤</div></div>
            <div id="panel">
                <h2 id="title">מוכנים?</h2>
                <p id="desc"></p>
                <img id="ex-img-big" src="">
                <button id="next-task-btn" style="display:none; margin-top:20px;" onclick="goToSafe()">למשימה הבאה! 🔓</button>
            </div>
        </div>
    </div>

    <div id="safe-page">
        <h1>🔐  פצחו את הכספת בכדי לקבל את האפיקומן</h1>
        <p>גררו את 4 תמונות הפסח לריבועים ואז לחצו על המפתח</p>

        <div class="drop-container">
            <div class="target-slot" ondrop="drop(event)" ondragover="allowDrop(event)"></div>
            <div class="target-slot" ondrop="drop(event)" ondragover="allowDrop(event)"></div>
            <div class="target-slot" ondrop="drop(event)" ondragover="allowDrop(event)"></div>
            <div class="target-slot" ondrop="drop(event)" ondragover="allowDrop(event)"></div>
        </div>

        <div class="inventory">
            <img src="פסח1.png" id="p1" draggable="true" ondragstart="drag(event)">
            <img src="פסח2.png" id="p2" draggable="true" ondragstart="drag(event)">
            <img src="פסח3.png" id="p3" draggable="true" ondragstart="drag(event)">
            <img src="פסח4.png" id="p4" draggable="true" ondragstart="drag(event)">
        </div>

        <div class="safe-wrapper" id="safe-anim-container">
            <img src="אפיקומן.png" id="afikoman-result">
            <img src="מפתח.png" id="key-img" onclick="openSafeNow()">
            <img src="כספתכתום.png" id="safe-orange" class="safe-part">
            <img src="כספתירוק.png" id="safe-green" class="safe-part">
        </div>
    </div>

    <script>
        const exercises = {
            2:  { title: "בכדי להתקדם עליך לשים ידיים על הראש", img: "pic1.png" },
            5:  { title: "בכדי להתקדם, עליך לשים ידיים על הכתפיים", img: "pic2.png" },
            7:  { title: "בכדי להתקדם, עלייך לשים ידיים בהצלבה החזה", img: "pic3.png" },
            10: { title: "בכדי להתקדם עליך להושיט ידיים לצדדים", img: "pic4.png" },
            13: { title: "בכדי להתקדם, עלייך להרים ידיים לשמיים", img: "pic5.png" },
            15: { title: "בכדי להתקדם, עלייך לשים ידיים בהצלבה על הברכיים", img: "pic6.png" },
            17: { title: "הגעת לסוף המסלול!", img: "afikoman.png", isWin: true }
        };

        let currentPos = 1;
        let imagesPlaced = 0;

        function startGame() {
            document.getElementById('intro-overlay').style.display = 'none';
            document.getElementById('main-game').style.filter = 'none';
        }

        const board = document.getElementById('board');
        for (let i = 1; i <= 17; i++) {
            const cell = document.createElement('div');
            cell.id = `c${i}`; cell.className = 'cell';
            const num = document.createElement('div');
            num.className = 'num-tag'; num.innerText = i;
            cell.appendChild(num);
            if (exercises[i]) {
                cell.classList.add(exercises[i].isWin ? 'finish-cell' : 'has-task');
                const img = document.createElement('img');
                img.src = exercises[i].img;
                cell.appendChild(img);
            }
            board.appendChild(cell);
        }

        function movePlayer(pos) {
            const cell = document.getElementById(`c${pos}`);
            const p = document.getElementById('player');
            p.style.left = (cell.offsetLeft + cell.offsetWidth/2 - 30) + "px";
            p.style.top = (cell.offsetTop + cell.offsetHeight/2 - 30) + "px";
        }

        async function rollDice() {
            const btn = document.getElementById('roll-btn');
            const dice = document.getElementById('dice');
            btn.disabled = true;
            const res = Math.floor(Math.random() * 3) + 1;
            const rotations = [{x:0,y:0}, {x:0,y:-90}, {x:-90,y:0}];
            const rot = rotations[res - 1];
            dice.style.transform = `rotateX(${rot.x + 1440}deg) rotateY(${rot.y + 1440}deg)`;
            await new Promise(r => setTimeout(r, 1200));
            for (let i = 0; i < res; i++) {
                if (currentPos < 17) {
                    currentPos++; movePlayer(currentPos);
                    await new Promise(r => setTimeout(r, 500));
                }
            }
            checkStatus();
            if (currentPos < 17) btn.disabled = false;
        }

        function checkStatus() {
            const ex = exercises[currentPos];
            if (ex) {
                document.getElementById('title').innerText = ex.isWin ? "סוף המסלול!" : "זמן למשימה!";
                document.getElementById('desc').innerText = ex.title;
                document.getElementById('ex-img-big').src = ex.img;
                document.getElementById('ex-img-big').style.display = "block";
                if (ex.isWin) document.getElementById('next-task-btn').style.display = "inline-block";
            }
        }

        function goToSafe() {
            document.getElementById('main-game').style.display = 'none';
            document.getElementById('safe-page').style.display = 'flex';
        }

        function allowDrop(ev) { ev.preventDefault(); }
        function drag(ev) { ev.dataTransfer.setData("text", ev.target.id); }

        function drop(ev) {
            ev.preventDefault();
            var data = ev.dataTransfer.getData("text");
            if (ev.target.children.length === 0 && ev.target.classList.contains('target-slot')) {
                ev.target.appendChild(document.getElementById(data));
                imagesPlaced++;
                if (imagesPlaced === 4) {
                    document.getElementById('key-img').style.display = 'block';
                }
            }
        }

        function openSafeNow() {
            document.getElementById('key-img').style.display = 'none';
            document.getElementById('afikoman-result').style.display = 'block';
            document.getElementById('safe-anim-container').classList.add('safe-open');
            document.getElementById('win-sound').play();
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
        }

        window.onload = () => movePlayer(1);
    </script>
</body>
</html>
