<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>משחק הזיכרון של גן בנטל</title>
    <style>
        /* הגדרות כלליות */
        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            text-align: center; 
            background: #f0fdf4; 
            padding: 20px; 
            display: block; /* מוצג תמיד ללא סיסמה */
        } 
        
        h1 { color: #166534; font-size: 3rem; margin-bottom: 10px; }
        
        #status { font-size: 1.2rem; color: #166534; margin-bottom: 10px; }

        .grid { 
            display: grid; 
            grid-template-columns: repeat(4, 150px); 
            gap: 15px; 
            justify-content: center; 
            margin-top: 20px;
        }

        /* עיצוב הכרטיס */
        .card { 
            width: 150px; height: 200px; 
            background: #22c55e; border: 4px solid white; 
            border-radius: 15px; cursor: pointer; 
            display: flex; align-items: center; justify-content: center; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); perspective: 1000px;
            position: relative;
        }
        
        .card img { width: 100%; height: 100%; object-fit: cover; border-radius: 11px; display: none; }
        .flipped { background: white; transform: rotateY(10deg); }
        .flipped img { display: block; }
        .flipped .q-mark { display: none; }
        .q-mark { color: white; font-size: 60px; font-weight: bold; }

        /* אנימציה לזוג שנמצא */
        .matched { animation: celebrate 0.5s ease; border-color: #fbbf24; cursor: default; }
        
        @keyframes celebrate {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        /* כפתור חזרה לתפריט */
        .back-btn {
            display: inline-block;
            margin-top: 30px;
            padding: 12px 25px;
            background: #6366f1;
            color: white;
            text-decoration: none;
            border-radius: 20px;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

    <h1>משחק הזיכרון של גן בנטל</h1>
    <div id="status">מצאו את כל הזוגות!</div>
    <div class="grid" id="board"></div>

    <a href="index.html" class="back-btn">חזרה לתפריט הראשי</a>

    <script>
        // --- הגדרות המשחק ---
        const numbers = ['1', '2', '3', '4', '5', '6', '7'];
        const deck = [...numbers, ...numbers].sort(() => 0.5 - Math.random());
        const board = document.getElementById('board');
        let choice = [];
        let matchesFound = 0;

        // טעינת צליל מהרשת
        const winSound = new Audio('https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg');

        function tryExtensions(el, name) {
            const exts = ['JPG', 'jpg', 'png', 'PNG', 'jpeg'];
            let i = 0;
            el.onerror = () => {
                i++;
                if (i < exts.length) el.src = name + '.' + exts[i];
            };
            el.src = name + '.' + exts[0];
        }

        deck.forEach(num => {
            const card = document.createElement('div');
            card.className = 'card';
            const img = document.createElement('img');
            tryExtensions(img, num);
            
            card.innerHTML = `<span class="q-mark">?</span>`;
            card.appendChild(img);
            
            card.onclick = function() {
                if (choice.length < 2 && !this.classList.contains('flipped') && !this.classList.contains('matched')) {
                    this.classList.add('flipped');
                    choice.push(this);
                    
                    if (choice.length === 2) {
                        if (choice[0].querySelector('img').src === choice[1].querySelector('img').src) {
                            // מצאנו זוג!
                            choice.forEach(c => c.classList.add('matched'));
                            winSound.play().catch(e => console.log("Sound error")); 
                            matchesFound++;
                            choice = [];
                            if (matchesFound === numbers.length) {
                                setTimeout(() => alert("כל הכבוד! ניצחתם!"), 500);
                            }
                        } else {
                            // לא זוג - הופכים חזרה
                            setTimeout(() => {
                                choice[0].classList.remove('flipped');
                                choice[1].classList.remove('flipped');
                                choice = [];
                            }, 1000);
                        }
                    }
                }
            };
            board.appendChild(card);
        });
    </script>
</body>
</html>
