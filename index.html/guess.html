<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>נחש מי - גן בנטל</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            text-align: center; 
            background: #fefce8; 
            margin: 0; padding: 20px;
            overflow: hidden;
        }
        h1 { color: #854d0e; font-size: 2.5rem; }
        
        /* אזור האיבר שמופיע באמצע */
        .question-area {
            margin: 20px auto;
            width: 250px; height: 250px;
            background: white;
            border: 5px solid #eab308;
            border-radius: 20px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
        }
        .question-area img { max-width: 90%; max-height: 90%; border-radius: 10px; }

        /* אזור בחירת הילדים */
        .options-area {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
        }
        .option-card {
            width: 180px; height: 180px;
            background: white;
            border: 4px solid #ca8a04;
            border-radius: 15px;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.5s;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .option-card:hover { transform: scale(1.05); }
        .option-card img { width: 100%; height: 100%; object-fit: cover; border-radius: 11px; }

        /* כפתור חזרה */
        .back-btn {
            position: fixed; top: 20px; right: 20px;
            padding: 10px 20px; background: #6366f1; color: white;
            text-decoration: none; border-radius: 15px; font-weight: bold;
        }

        /* הסתרת כרטיס טועה */
        .wrong-choice { opacity: 0; pointer-events: none; transform: scale(0.5); }
    </style>
</head>
<body>

    <a href="index.html" class="back-btn">חזרה לתפריט</a>

    <h1>נחש מי זה? 🤔</h1>
    <p>מי הילד שזה האיבר שלו?</p>

    <div class="question-area" id="target-organ">
        </div>

    <div class="options-area" id="options">
        </div>

    <script>
        const totalKids = 9;
        let currentCorrectIndex = -1;

        // צלילים
        const winSound = new Audio('https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3');
        const failSound = new Audio('https://assets.mixkit.co/active_storage/sfx/2572/2572-preview.mp3');

        function startGame() {
            const board = document.getElementById('options');
            board.innerHTML = '';
            
            // 1. בוחרים ילד נכון באקראי (1-9)
            currentCorrectIndex = Math.floor(Math.random() * totalKids) + 1;

            // 2. מציגים את האיבר שלו
            const targetDiv = document.getElementById('target-organ');
            targetDiv.innerHTML = `<img src="איבר${currentCorrectIndex}.png" onerror="this.src='https://via.placeholder.com/200?text=איבר+חסר'">`;

            // 3. יוצרים רשימה של 3 אפשרויות (הנכון + 2 טועים)
            let choices = [currentCorrectIndex];
            while (choices.length < 3) {
                let randomKid = Math.floor(Math.random() * totalKids) + 1;
                if (!choices.includes(randomKid)) {
                    choices.push(randomKid);
                }
            }
            
            // מערבבים את האפשרויות
            choices.sort(() => Math.random() - 0.5);

            // 4. יוצרים את הכרטיסים על המסך
            choices.forEach(kidIndex => {
                const card = document.createElement('div');
                card.className = 'option-card';
                card.innerHTML = `<img src="תמונה${kidIndex}.png" onerror="this.src='https://via.placeholder.com/150?text=תמונה+חסרה'">`;
                
                card.onclick = function() {
                    checkChoice(kidIndex, card);
                };
                board.appendChild(card);
            });
        }

        function checkChoice(index, element) {
            if (index === currentCorrectIndex) {
                // הצלחה!
                winSound.play();
                confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
                
                setTimeout(() => {
                    alert("כל הכבוד! זה נכון!");
                    startGame(); // עוברים לשלב הבא
                }, 1000);
            } else {
                // טעות
                failSound.play();
                element.classList.add('wrong-choice'); // מעלים את התמונה מהמסך
            }
        }

        window.onload = startGame;
    </script>
</body>
</html>
